version: '3.8'

services:

  backend:
    build:
      context: ./server
    container_name: blinkit_backend
    ports:
      - "8090:8090"
    env_file:
      - ./server/.env
  
  frontend:
    build:
      context: ./client
    container_name: blinkit_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    env_file:
      - ./client/.env
